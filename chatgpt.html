<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            background-color: #1e293b;
            padding: 15px;
        }

        nav a {
            color: #facc15;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            background-color: #facc15;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        .links a:hover {
            background-color: #eab308;
        }
    </style>
</head>

<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="index.html">My Portfolio</a>
    </nav>
</header>

<div class="container">
    <h2>Hello, I'm <bold>Ayush</bold></h2>

    <!-- Your Image -->
    <img src="myphoto.jpg" alt="My Photo" height="100">

    <p>Welcome to my personal portfolio website.</p>

    <!-- Profile Links -->
    <div class="links">
        <a href="https://github.com/yourusername" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/yourusername" target="_blank">LinkedIn</a>
    </div>
</div>

</body>
</html>
